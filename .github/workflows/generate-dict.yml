name: Generate Dictionary
on:
  push:
    paths:
      - 'build_ru.py'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Generate Dictionary
        run: python build_ru.py
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add jcuken.dict.yaml
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-generate jcuken.dict.yaml" && git push)